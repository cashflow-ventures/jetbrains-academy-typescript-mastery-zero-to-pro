message_correct: "Correct! Generics preserve types (unlike `any`), TypeScript infers\
  \ type arguments, and default parameters must come last. Constraints define a minimum\
  \ requirement, not an exact match, and you can't use type-specific methods without\
  \ constraints."
message_incorrect: "Review the key concepts: generics preserve type information that\
