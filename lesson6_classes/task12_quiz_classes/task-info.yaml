  \ are erased at runtime."
message_incorrect: "Review the differences: `private` is class-only (not even subclasses),\
  \ `protected` includes subclasses, abstract classes cannot be instantiated, a class\
  \ extends one class but implements many interfaces, and interfaces don't exist at\
  \ runtime."
