message_correct: "Exactly! The `using` declaration guarantees that `[Symbol.dispose]()`\
  \ is called when the variable leaves scope — whether execution completes normally\
  \ or an error is thrown. This is the core advantage over manual `try/finally` patterns."
message_incorrect: "Not quite. `using` guarantees cleanup via `[Symbol.dispose]()`\
  \ when the variable goes out of scope, even during errors — that is its primary\
  \ advantage. `Disposable` only requires `[Symbol.dispose]()` (not the async variant),\
  \ `using` works with any object that has `[Symbol.dispose]()` (not just classes),\
  \ and `DisposableStack` disposes in reverse order (LIFO), not FIFO."
