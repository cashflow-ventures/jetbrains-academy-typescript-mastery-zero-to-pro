options:
  - text: "`using` automatically calls `[Symbol.dispose]()` when the variable goes out\
    \ of scope, even if an error is thrown"
    is_correct: true
  - text: '`using` is just syntactic sugar for `try/catch` and does not guarantee cleanup
    on errors'
    is_correct: false
  - text: "The `Disposable` interface requires implementing both `[Symbol.dispose]()`\
