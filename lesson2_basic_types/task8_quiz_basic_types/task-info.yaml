message_correct: "Exactly! `unknown` forces you to narrow the type (using typeof,\
  \ instanceof, etc.) before you can use the value. This makes it the type-safe alternative\
  \ to `any`."
message_incorrect: "Not quite. Remember: `unknown` requires narrowing before use (unlike\
  \ `any` which allows anything). A tuple has fixed length and per-position types\
  \ (unlike a union array). `never` is for functions that never return at all (not\
  \ `undefined`). And `bigint` cannot be mixed with `number` in arithmetic."
