message_correct: "Exactly! TypeScript is a superset of JavaScript — every valid JS\
  \ program is valid TS. It adds static types that are checked at compile time and\
  \ then erased, producing plain JavaScript that any runtime can execute."
message_incorrect: "Not quite. TypeScript is a superset of JavaScript, meaning all\
  \ JavaScript is valid TypeScript. The TypeScript compiler (`tsc`) checks types at\
  \ compile time and then removes them, outputting plain JavaScript. It doesn't replace\
