message_correct: "Correct! Since `Admin` is an interface (not a class), it doesn't\
  \ exist at runtime. You can't use `typeof` (which only returns primitive type names)\
  \ or `instanceof` (which requires a constructor). A custom type guard with `value\
  \ is Admin` lets you write the runtime checks yourself while telling TypeScript\
  \ the result."
message_incorrect: "Not quite. `typeof` only returns primitive names like \"string\"\
  \ or \"number\" — it can't detect interfaces. `instanceof` requires a class constructor,\
  \ but interfaces are erased at runtime. A truthiness check only eliminates null/undefined/falsy.\
  \ The `in` operator can help narrow, but doesn't guarantee the full interface shape.\
  \ A custom type guard function with `value is Admin` is the correct approach for\
  \ narrowing to an interface type."
