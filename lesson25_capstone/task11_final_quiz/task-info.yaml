message_incorrect: "Review these key concepts: (1) TypeScript erases all types at\
  \ compile time — no type info exists at runtime (Lesson 1). (2) Branded types add\
  \ a phantom property to break structural equivalence (Lesson 17). (3) `satisfies`\
  \ is purely a compile-time check — it never affects runtime values (Lesson 5). (4)\
  \ Conditional types distribute over unions when the checked type is a bare type\
  \ parameter (Lesson 15). (5) `using` requires `Disposable` with `Symbol.dispose`\
  \ (Lesson 20). (6) `unknown` is the type-safe counterpart to `any` — you must narrow\
